name: 4. Weekly newsletter digest

# Renders the "new auctions this week per city" digest from the committed
# data/<city>/properties.json into newsletter/ and updates newsletter/seen.json
# (the stored sent-list that makes "new" a delta rather than a date filter). The
# generator is pure Node stdlib (no deps) and idempotent. Nothing to send yet —
# the ESP/send integration is a separate TODO (P1-D).
#
# The seen-state commit can't loop: GITHUB_TOKEN pushes don't trigger workflows,
# and no workflow watches newsletter/ (refresh.yml keys on pipeline code paths,
# extension-ci.yml on extension/**).

on:
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC (~08:00 CEST / 07:00 CET). cron is
                          # UTC-only and can't follow DST. Runs after the daily
                          # refresh (04:00 UTC) so the week's data is already in.
  workflow_dispatch:
    inputs:
      include_concluded:
        description: 'Also list newly-crawled concluded results (sold/unsold), not just open auctions'
        type: boolean
        default: false

permissions:
  contents: write

# One digest run at a time; a second overlapping run would race the seen-state
# commit.
concurrency:
  group: newsletter
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'

      # No npm install: the generator imports only node: builtins.
      - name: Generate digest + update seen-state
        run: node pipeline/scripts/newsletter-digest.js ${{ (github.event_name == 'workflow_dispatch' && inputs.include_concluded) && '--include-concluded' || '' }}

      - name: Commit seen-state + digest
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add newsletter
          if git diff --cached --quiet; then
            echo 'no newsletter changes to commit'
          else
            git commit -m 'newsletter: weekly digest + seen-state [skip ci]'
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
            git push
          fi
