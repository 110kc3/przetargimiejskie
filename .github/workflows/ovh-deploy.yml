# Publishes przetargimiejskie.pl to OVH shared web hosting via SFTP.
#
# The site is fully static (HTML + JSON in /data + extension.zip). This assembles
# _site (build-site.sh) and mirrors it to the hosting's document root over SFTP
# (SSH, port 22) — OVH offers both FTP/FTPS (21) and SFTP (22), and SFTP is the
# reliable one from CI (FTPS times out from GitHub runners due to passive-port
# firewalling). Runs on push to main when the site/data/extension change, so each
# pipeline data refresh (refresh.yml commits data/<city>/*.json) republishes.
#
# REQUIRED repository secrets (Settings → Secrets and variables → Actions):
#   OVH_FTP_SERVER    the SFTP host from OVH "FTP - SSH" tab → ftp.cluster129.hosting.ovh.net
#   OVH_FTP_USERNAME  the SFTP user → przetaa
#   OVH_FTP_PASSWORD  that user's password
#
# Target: the OVH "Multi-site" tab roots przetargimiejskie.pl (and www.) at the
# `www` folder under the home dir (/home/przetaa), so we mirror into `www/`.
name: Deploy site to OVH (przetargimiejskie.pl)

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'data/**'
      - 'extension/**'
      - 'build-site.sh'
      - '.github/workflows/ovh-deploy.yml'
  workflow_dispatch:

concurrency:
  group: ovh-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site into _site/
        run: bash build-site.sh _site

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Mirror _site/ to OVH over SFTP
        env:
          SFTP_SERVER: ${{ secrets.OVH_FTP_SERVER }}
          SFTP_USER: ${{ secrets.OVH_FTP_USERNAME }}
          LFTP_PASSWORD: ${{ secrets.OVH_FTP_PASSWORD }}
        run: |
          set -euo pipefail
          lftp -u "$SFTP_USER" --env-password "sftp://$SFTP_SERVER" <<'LFTP'
          set sftp:auto-confirm yes
          set net:timeout 20
          set net:max-retries 3
          set net:reconnect-interval-base 5
          set mirror:parallel-transfer-count 4
          mirror --reverse --delete --verbose _site/ www/
          bye
          LFTP
