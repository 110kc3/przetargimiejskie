# Workflow catalog: see .github/workflows/README.md (names are numbered so the
# Actions sidebar sorts in pipeline order).
name: 1. Refresh auction data

on:
  push:
    branches: [main]
    # Run on pushes that change pipeline code/config — i.e. when a parser or
    # crawler fix should regenerate data. We IGNORE pushes that only touch the
    # generated data, the caches, docs, or the extension, so:
    #   - the bot's own "data: refresh" commit never re-triggers a run
    #     (belt-and-suspenders: GITHUB_TOKEN pushes don't trigger workflows
    #      anyway, so there's no loop), and
    #   - trivial doc / extension-only pushes don't kick off a full crawl.
    # To run on EVERY push instead, delete this whole `paths-ignore` block.
    paths-ignore:
      - 'data/**'
      - 'pipeline/ocr-cache/**'
      - 'pipeline/pdf-text-cache/**'
      - 'pipeline/doc-text-cache/**'
      - 'pipeline/rtf-text-cache/**'
      - 'pipeline/detail-cache/**'
      - 'pipeline/uldk-cache/**'
      - 'extension/**'
      - '**/*.md'
  schedule:
    - cron: '0 4 * * *'      # Daily 04:00 UTC (approx 06:00 Polish time, CEST).
                             # cron is UTC-only and can't follow DST, so in winter
                             # (CET) it fires 05:00 local. health.yml runs at 07:00 UTC.
  workflow_dispatch:         # adds a "Run workflow" button in the Actions UI
    inputs:
      only_city:
        description: 'Run a single city id (empty = all cities)'
        required: false
        default: ''
      force_fail:
        description: 'City id to force-fail (triage E2E test — see scripts/triage-report.js)'
        required: false
        default: ''

permissions:
  contents: write

# One refresh at a time — the per-city jobs inside a run push commits with a
# rebase-retry, but two overlapping RUNS would interleave unpredictably.
concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  # Emit the city registry as the matrix input + gate everything on the parser
  # tests (run once here instead of 9× in the matrix).
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      cities: ${{ steps.registry.outputs.cities }}
      # Cities whose adapter needs core/render.js (headless Chromium) — the
      # matrix installs Playwright only for these (see `needsRender` in the
      # city's config.js). Registry-driven so it can't drift.
      render_cities: ${{ steps.registry.outputs.render_cities }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
      - name: Install pipeline deps
        working-directory: pipeline
        run: npm ci || npm install
      - name: Run parser tests
        working-directory: pipeline
        run: npm test
      - name: Read city registry
        id: registry
        working-directory: pipeline
        env:
          # workflow_dispatch only — restricts the matrix to one city (used by
          # the triage E2E test so a test run can't touch other cities).
          ONLY_CITY: ${{ inputs.only_city || '' }}
        run: |
          echo "cities=$(node -e "import('./src/cities/index.js').then(m=>{const only=process.env.ONLY_CITY;const ids=m.cities.map(c=>c.id).filter(id=>!only||id===only);console.log(JSON.stringify(ids))})")" >> "$GITHUB_OUTPUT"
          echo "render_cities=$(node -e "import('./src/cities/index.js').then(m=>console.log(JSON.stringify(m.cities.filter(c=>c.needsRender).map(c=>c.id))))")" >> "$GITHUB_OUTPUT"

  # One job per city, so a broken parser/source in one city can't block the
  # others (fail-fast off). Each job runs `CITY=<id> npm run refresh` (which
  # skips data/index.json — see src/refresh.js) and commits only its own
  # data/<city>/ + caches. Commits race on push, so push uses a rebase-retry;
  # the per-job paths are disjoint, so the rebases are always clean.
  refresh:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 25   # Zabrze alone needs ~113 throttled doc+attachment fetches
    strategy:
      fail-fast: false
      max-parallel: 10    # each job crawls a DIFFERENT city's BIP, so per-site
                          # politeness is unaffected by parallelism — the crawl
                          # throttle inside a job is what protects a BIP. 10 keeps
                          # the 46-city run well under an hour (free-tier ceiling
                          # is 20 concurrent jobs; was 4, which pushed wall time
                          # toward 1h as cities grew).
      matrix:
        city: ${{ fromJSON(needs.setup.outputs.cities) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install OCR toolchain
        run: |
          # GH-hosted runners preconfigure packages.microsoft.com / azure-cli apt
          # repos that intermittently serve a broken InRelease ("NOSPLIT" / "no
          # longer signed"), making `apt-get update` exit 100 and fail this step —
          # though we only need packages from the standard Ubuntu repos. Drop any
          # Microsoft-repo source first so that recurring flake can't break CI.
          sudo grep -rlZ packages.microsoft.com /etc/apt/sources.list.d/ 2>/dev/null | sudo xargs -0r rm -f || true
          sudo apt-get update -qq
          # poppler-utils: pdftotext (text PDFs) · tesseract: OCR (scanned PDFs)
          # catdoc: legacy .doc → text (Bytom announcement attachments)
          sudo apt-get install -y -qq poppler-utils tesseract-ocr tesseract-ocr-pol catdoc

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'

      - name: Install pipeline deps
        working-directory: pipeline
        run: npm ci || npm install

      # Headless Chromium for the OPTIONAL renderer (core/render.js), used only by
      # JS-rendered BIPs (config `needsRender: true` — currently just Chrzanów).
      # render.js is lazy-loaded, so server-rendered cities never touch it;
      # skipping the install here saves ~1–2 min × every non-render job.
      - name: Install Playwright Chromium
        if: contains(fromJSON(needs.setup.outputs.render_cities), matrix.city)
        working-directory: pipeline
        run: npx playwright install --with-deps chromium

      # Refresh with the triage instrumentation around it: the pre-run meta is
      # snapshotted (the commit step moves HEAD, so it can't be recovered
      # later), all output is teed to a log the classify step reads, and
      # DEBUG_FETCH_DIR preserves the first ~25 fetched bodies as layout-change
      # evidence. Step-level timeout (< the job's 25) so a hung crawl still
      # reaches the always() classify + upload steps instead of being
      # hard-killed with nothing to show.
      - name: Run pipeline for ${{ matrix.city }}
        id: refresh
        timeout-minutes: 20
        working-directory: pipeline
        run: |
          set -o pipefail
          mkdir -p "$GITHUB_WORKSPACE/triage/snapshots"
          cp "$GITHUB_WORKSPACE/data/${{ matrix.city }}/meta.json" "$GITHUB_WORKSPACE/triage/prev-meta.json" 2>/dev/null || true
          CITY=${{ matrix.city }} \
            FORCE_FAIL="${{ inputs.force_fail || '' }}" \
            DEBUG_FETCH_DIR="$GITHUB_WORKSPACE/triage/snapshots" \
            npm run refresh 2>&1 | tee "$GITHUB_WORKSPACE/triage/refresh.log"

      # Data sanity gate — glued prices, cellar/plot areas, junk streets,
      # genitive zombie duplicates (the June 2026 bug classes). A failure
      # blocks ONLY this city's commit; its last-good data stays published.
      - name: Sanity-check ${{ matrix.city }} data
        id: sanity
        working-directory: pipeline
        run: |
          set -o pipefail
          node scripts/sanity-check.js ${{ matrix.city }} 2>&1 | tee "$GITHUB_WORKSPACE/triage/sanity.log"

      # Upgrade land plots' geoportal links to PRECISE national-geoportal
      # identifyParcel deep-links (resolves obręb + parcel → TERYT id via ULDK).
      # Cached in pipeline/uldk-cache/; fully defensive — a ULDK outage just
      # degrades to the parcel-search fallback and never fails the data commit
      # (continue-on-error makes that doubly sure).
      - name: Enrich land geoportal links for ${{ matrix.city }}
        continue-on-error: true
        working-directory: pipeline
        run: CITY=${{ matrix.city }} npm run enrich-land

      - name: Commit and push if data changed
        run: |
          git config user.name  "zgm-data-bot"
          git config user.email "zgm-data-bot@users.noreply.github.com"
          # Add only paths that exist. A thin/empty city may legitimately produce
          # no data/<city>/ dir, and `git add <missing-path>` hard-fails the whole
          # job (exit 128 — the "did not match any files" failure). Loop instead.
          for p in data/${{ matrix.city }} pipeline/ocr-cache pipeline/pdf-text-cache pipeline/doc-text-cache pipeline/rtf-text-cache pipeline/detail-cache pipeline/uldk-cache; do
            [ -e "$p" ] && git add "$p"
          done
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "data: refresh ${{ matrix.city }} $(date -u +%Y-%m-%d)"
            # Sibling matrix jobs push concurrently; rebase-retry until ours lands.
            # -X theirs: if our own data/<city>/meta.json (its generated_at line)
            # conflicts with a version already on origin (a prior run, a manual
            # push), our fresh crawl wins — we only ever touch our own city + the
            # shared caches (content-addressed, so additions never truly conflict).
            # On any failure, abort the half-done rebase so the next retry starts
            # from a CLEAN tree — otherwise "unmerged files" breaks every retry.
            for i in 1 2 3 4 5 6; do
              git pull --rebase -X theirs origin main && git push && exit 0
              git rebase --abort 2>/dev/null || true
              echo "push attempt $i failed; retrying ..."
              sleep $(( (RANDOM % 8) + 2 ))
            done
            echo "could not push after 6 attempts" >&2
            exit 1
          fi

      # Failure triage — decides from the teed logs + meta counts whether this
      # city is BROKEN (a green job proves nothing: refresh.js swallows per-city
      # throws and preserve-on-empty exits 0 by design). Writes
      # triage/failure.json + issue-body.md only when broken; always exits 0 so
      # it can never affect the data commit above. The triage job turns the
      # uploaded artifact into a GitHub issue.
      - name: Triage classify
        if: always()
        working-directory: pipeline
        run: |
          node scripts/triage-report.js classify \
            --city ${{ matrix.city }} \
            --refresh-outcome "${{ steps.refresh.outcome }}" \
            --sanity-outcome  "${{ steps.sanity.outcome }}" \
            --refresh-log "$GITHUB_WORKSPACE/triage/refresh.log" \
            --sanity-log  "$GITHUB_WORKSPACE/triage/sanity.log" \
            --prev-meta   "$GITHUB_WORKSPACE/triage/prev-meta.json" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --run-id "${{ github.run_id }}" \
            --out-dir "$GITHUB_WORKSPACE/triage"

      # Only uploads when classify found a failure — a healthy day produces
      # zero triage artifacts, so "green + no artifact" is the recovery signal.
      - name: Upload triage artifact
        if: always() && hashFiles('triage/failure.json') != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: triage-${{ matrix.city }}
          path: triage/
          retention-days: 14

  # Turn the per-city triage artifacts into GitHub issues: one open issue per
  # broken city ([city-broken] <id>: <why>, body = a paste-into-Claude-Code
  # triage prompt), a "still failing" comment on repeats, auto-close on
  # recovery. GitHub's native issue notifications deliver the email.
  triage:
    needs: [setup, refresh]
    if: ${{ always() && needs.setup.result == 'success' && github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      issues: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
      # triage-report.js / issue-sync.js are dependency-free — no npm ci needed.
      - name: Download triage artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: 'triage-*'
          path: triage-artifacts
      # A job the runner hard-killed (job-level timeout, runner loss) never ran
      # its classify step, so it has no artifact — synthesize a timeout entry
      # from the Actions API so it still gets an issue.
      - name: Synthesize entries for hard-killed jobs
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          mkdir -p triage-artifacts
          gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs" --paginate \
            --jq '.jobs[] | select(.name | startswith("refresh (")) | select(.conclusion=="failure" or .conclusion=="cancelled") | .name' |
          sed 's/^refresh (\(.*\))$/\1/' | while read -r city; do
            [ -n "$city" ] || continue
            [ -d "triage-artifacts/triage-$city" ] || \
              node pipeline/scripts/triage-report.js synthesize --city "$city" \
                --classification timeout --run-url "$RUN_URL" \
                --out-dir "triage-artifacts/triage-$city"
          done
      - name: Sync issues
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          # The recovered universe = the cities THIS run refreshed (the whole
          # registry normally; just the one city on an only_city dispatch, so a
          # single-city test run can never mass-close other cities' issues).
          CITIES_JSON: ${{ needs.setup.outputs.cities }}
        run: |
          RECOVERED=$(echo "$CITIES_JSON" | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>console.log(JSON.parse(s).join(',')))")
          node pipeline/scripts/issue-sync.js \
            --failures-dir triage-artifacts \
            --recovered "$RECOVERED" \
            --run-url "$RUN_URL" \
            --source refresh

  # Rebuild data/index.json once, after every city job has finished (also when
  # some failed — their last-published meta.json keeps them in the index).
  index:
    needs: [setup, refresh]
    if: ${{ always() && needs.setup.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: main   # not the triggering SHA — we need the matrix jobs' commits
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
      - name: Install pipeline deps
        working-directory: pipeline
        run: npm ci || npm install
      - name: Build data/index.json
        working-directory: pipeline
        run: |
          git pull origin main   # pick up any commit that landed since checkout
          npm run build-index
      - name: Commit and push if index changed
        run: |
          git config user.name  "zgm-data-bot"
          git config user.email "zgm-data-bot@users.noreply.github.com"
          git add data/index.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "data: rebuild index $(date -u +%Y-%m-%d)"
            for i in 1 2 3 4 5; do
              git pull --rebase -X theirs origin main && git push && exit 0
              git rebase --abort 2>/dev/null || true
              echo "push attempt $i failed; retrying ..."
              sleep 3
            done
            echo "could not push index after 5 attempts" >&2
            exit 1
          fi
