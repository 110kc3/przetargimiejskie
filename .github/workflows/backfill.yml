name: Backfill (full refresh — parallel matrix, long timeout)

# One-off "prime the cache" run, triggered MANUALLY (Actions → this workflow →
# Run workflow). Same pipeline as the daily refresh.yml, but:
#   1. every city's job gets a long timeout (350 min) so a COLD cache can't blow
#      the cap on the heavy/OCR cities, and
#   2. the budgeted crawlers (Białystok, Kędzierzyn-Koźle) are UN-bounded via env
#      so they fetch the full archive in one pass.
# Runs the cities in PARALLEL (matrix), so the whole backfill finishes in roughly
# the slowest city's time, not the sum. After it lands once, the daily matrix is
# fast on cache hits and the bounded crawlers only fetch deltas. Re-run if a job
# ever times out — each re-run resumes off the committed cache.
on:
  workflow_dispatch: {}

permissions:
  contents: write

# Share the daily refresh's lock so a backfill and a scheduled run never
# interleave commits on main.
concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  # Emit the city registry as the matrix input + gate on the parser tests.
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      cities: ${{ steps.registry.outputs.cities }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
      - name: Install pipeline deps
        working-directory: pipeline
        run: npm ci || npm install
      - name: Run parser tests
        working-directory: pipeline
        run: npm test
      - name: Read city registry
        id: registry
        working-directory: pipeline
        run: |
          echo "cities=$(node -e "import('./src/cities/index.js').then(m=>console.log(JSON.stringify(m.cities.map(c=>c.id))))")" >> "$GITHUB_OUTPUT"

  # One job per city, parallel, long timeout, crawlers un-bounded. A failure
  # blocks ONLY that city's commit; the others still backfill.
  backfill:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 350     # cold-cache full crawl per city (GitHub max is 360)
    strategy:
      fail-fast: false
      max-parallel: 4        # be polite to the BIPs even on a one-off
      matrix:
        city: ${{ fromJSON(needs.setup.outputs.cities) }}
    env:
      # Un-bound the budgeted crawlers for the backfill (daily keeps the caps).
      KK_CRAWL_BUDGET_MS: '300000000'
      KK_MAX_ARTICLES: '100000'
      BIALYSTOK_CRAWL_BUDGET_MS: '300000000'
      BIALYSTOK_MAX_DETAILS: '100000'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install OCR toolchain
        run: |
          sudo apt-get update -qq
          # poppler-utils: pdftotext · tesseract: scanned-PDF OCR · catdoc: legacy .doc
          sudo apt-get install -y -qq poppler-utils tesseract-ocr tesseract-ocr-pol catdoc

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'

      - name: Install pipeline deps
        working-directory: pipeline
        run: npm ci || npm install

      - name: Install Playwright Chromium
        working-directory: pipeline
        run: npx playwright install --with-deps chromium

      - name: Run pipeline for ${{ matrix.city }}
        working-directory: pipeline
        run: CITY=${{ matrix.city }} npm run refresh

      - name: Sanity-check ${{ matrix.city }} data
        working-directory: pipeline
        run: node scripts/sanity-check.js ${{ matrix.city }}

      - name: Enrich land geoportal links for ${{ matrix.city }}
        continue-on-error: true
        working-directory: pipeline
        run: CITY=${{ matrix.city }} npm run enrich-land

      - name: Commit and push if data changed
        run: |
          git config user.name  "zgm-data-bot"
          git config user.email "zgm-data-bot@users.noreply.github.com"
          # Add only paths that exist (a thin city may produce no data dir).
          for p in data/${{ matrix.city }} pipeline/ocr-cache pipeline/pdf-text-cache pipeline/doc-text-cache pipeline/rtf-text-cache pipeline/detail-cache pipeline/uldk-cache; do
            [ -e "$p" ] && git add "$p"
          done
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "data: backfill ${{ matrix.city }} $(date -u +%Y-%m-%d)"
            for i in 1 2 3 4 5 6; do
              git pull --rebase origin main && git push && exit 0
              echo "push attempt $i failed; retrying ..."
              sleep $(( (RANDOM % 8) + 2 ))
            done
            echo "could not push after 6 attempts" >&2
            exit 1
          fi

  # Rebuild data/index.json once every city job has finished.
  index:
    needs: [setup, backfill]
    if: ${{ always() && needs.setup.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: main
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
      - name: Install pipeline deps
        working-directory: pipeline
        run: npm ci || npm install
      - name: Build data/index.json
        working-directory: pipeline
        run: |
          git pull origin main
          npm run build-index
      - name: Commit and push if index changed
        run: |
          git config user.name  "zgm-data-bot"
          git config user.email "zgm-data-bot@users.noreply.github.com"
          git add data/index.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "data: rebuild index $(date -u +%Y-%m-%d)"
            for i in 1 2 3; do
              git pull --rebase origin main && git push && exit 0
              echo "push attempt $i failed; retrying ..."
              sleep 3
            done
            echo "could not push index after 3 attempts" >&2
            exit 1
          fi
