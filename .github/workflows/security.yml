# Lightweight security safety net (~3-4 min/run). Two independent jobs, both
# reporting to the repo Security tab via SARIF — neither blocks a push/PR:
#
#   - CodeQL (javascript): the project's real risk class is crawled municipal
#     content flowing into innerHTML / hrefs across the extension, popup and
#     site (the exact bug family hand-fixed in v1.14.3 and re-hardened in
#     v1.20.1). JS needs no build step. Free for public repos.
#   - Trivy fs: lockfile CVEs (the playwright chain is the only dependency) +
#     secret scanning over the whole tree (data/ and the crawl caches get
#     committed — cheap insurance against an accidentally committed token).
#
# All third-party actions are pinned to a full commit SHA (with the human tag
# in a trailing comment) so a moved tag can't silently change what runs — this
# repo's refresh.yml holds `contents: write`, so supply-chain hygiene matters.
name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 7 * * 1'   # Mondays 07:00 UTC (an hour after the data refresh)
  workflow_dispatch: {}

# Default to read-only; each job widens to exactly what it needs.
permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: CodeQL (javascript)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write   # upload the analysis SARIF
      actions: read            # required for private repos; harmless on public
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Initialize CodeQL
        uses: github/codeql-action/init@8272c299f21ca24af15dfe9ac0971ba969e5e0d5 # v3.36.2
        with:
          languages: javascript
      - name: Analyze
        uses: github/codeql-action/analyze@8272c299f21ca24af15dfe9ac0971ba969e5e0d5 # v3.36.2
        with:
          category: '/language:javascript'

  trivy:
    name: Trivy (deps + secrets)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write   # upload the Trivy SARIF
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Trivy filesystem scan (vuln + secret)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: fs
          scanners: vuln,secret
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'         # report, don't block — this is a safety net
          skip-dirs: 'pipeline/node_modules'
      - name: Upload Trivy results to the Security tab
        uses: github/codeql-action/upload-sarif@8272c299f21ca24af15dfe9ac0971ba969e5e0d5 # v3.36.2
        with:
          sarif_file: trivy-results.sarif
