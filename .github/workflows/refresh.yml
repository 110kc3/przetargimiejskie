name: Refresh auction data

on:
  push:
    branches: [main]
    # Run on pushes that change pipeline code/config — i.e. when a parser or
    # crawler fix should regenerate data. We IGNORE pushes that only touch the
    # generated data, the caches, docs, or the extension, so:
    #   - the bot's own "data: refresh" commit never re-triggers a run
    #     (belt-and-suspenders: GITHUB_TOKEN pushes don't trigger workflows
    #      anyway, so there's no loop), and
    #   - trivial doc / extension-only pushes don't kick off a full crawl.
    # To run on EVERY push instead, delete this whole `paths-ignore` block.
    paths-ignore:
      - 'data/**'
      - 'pipeline/ocr-cache/**'
      - 'pipeline/pdf-text-cache/**'
      - 'pipeline/doc-text-cache/**'
      - 'pipeline/rtf-text-cache/**'
      - 'pipeline/detail-cache/**'
      - 'pipeline/uldk-cache/**'
      - 'extension/**'
      - '**/*.md'
  schedule:
    - cron: '0 4 * * *'      # Daily 04:00 UTC (approx 06:00 Polish time, CEST).
                             # cron is UTC-only and can't follow DST, so in winter
                             # (CET) it fires 05:00 local. health.yml runs at 07:00 UTC.
  workflow_dispatch: {}      # adds a "Run workflow" button in the Actions UI

permissions:
  contents: write

# One refresh at a time — the per-city jobs inside a run push commits with a
# rebase-retry, but two overlapping RUNS would interleave unpredictably.
concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  # Emit the city registry as the matrix input + gate everything on the parser
  # tests (run once here instead of 9× in the matrix).
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      cities: ${{ steps.registry.outputs.cities }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
      - name: Install pipeline deps
        working-directory: pipeline
        run: npm ci || npm install
      - name: Run parser tests
        working-directory: pipeline
        run: npm test
      - name: Read city registry
        id: registry
        working-directory: pipeline
        run: |
          echo "cities=$(node -e "import('./src/cities/index.js').then(m=>console.log(JSON.stringify(m.cities.map(c=>c.id))))")" >> "$GITHUB_OUTPUT"

  # One job per city, so a broken parser/source in one city can't block the
  # others (fail-fast off). Each job runs `CITY=<id> npm run refresh` (which
  # skips data/index.json — see src/refresh.js) and commits only its own
  # data/<city>/ + caches. Commits race on push, so push uses a rebase-retry;
  # the per-job paths are disjoint, so the rebases are always clean.
  refresh:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 25   # Zabrze alone needs ~113 throttled doc+attachment fetches
    strategy:
      fail-fast: false
      max-parallel: 4     # be gentle: 9 jobs hammering GH + the BIPs at once is overkill
      matrix:
        city: ${{ fromJSON(needs.setup.outputs.cities) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install OCR toolchain
        run: |
          sudo apt-get update -qq
          # poppler-utils: pdftotext (text PDFs) · tesseract: OCR (scanned PDFs)
          # catdoc: legacy .doc → text (Bytom announcement attachments)
          sudo apt-get install -y -qq poppler-utils tesseract-ocr tesseract-ocr-pol catdoc

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'

      - name: Install pipeline deps
        working-directory: pipeline
        run: npm ci || npm install

      # Headless Chromium for the OPTIONAL renderer (core/render.js), used only by
      # JS-rendered BIPs. It's lazy-loaded, so the server-rendered cities never
      # touch it — installing here just keeps a future JS-rendered city working.
      - name: Install Playwright Chromium
        working-directory: pipeline
        run: npx playwright install --with-deps chromium

      - name: Run pipeline for ${{ matrix.city }}
        working-directory: pipeline
        run: CITY=${{ matrix.city }} npm run refresh

      # Data sanity gate — glued prices, cellar/plot areas, junk streets,
      # genitive zombie duplicates (the June 2026 bug classes). A failure
      # blocks ONLY this city's commit; its last-good data stays published.
      - name: Sanity-check ${{ matrix.city }} data
        working-directory: pipeline
        run: node scripts/sanity-check.js ${{ matrix.city }}

      # Upgrade land plots' geoportal links to PRECISE national-geoportal
      # identifyParcel deep-links (resolves obręb + parcel → TERYT id via ULDK).
      # Cached in pipeline/uldk-cache/; fully defensive — a ULDK outage just
      # degrades to the parcel-search fallback and never fails the data commit
      # (continue-on-error makes that doubly sure).
      - name: Enrich land geoportal links for ${{ matrix.city }}
        continue-on-error: true
        working-directory: pipeline
        run: CITY=${{ matrix.city }} npm run enrich-land

      - name: Commit and push if data changed
        run: |
          git config user.name  "zgm-data-bot"
          git config user.email "zgm-data-bot@users.noreply.github.com"
          # Add only paths that exist. A thin/empty city may legitimately produce
          # no data/<city>/ dir, and `git add <missing-path>` hard-fails the whole
          # job (exit 128 — the "did not match any files" failure). Loop instead.
          for p in data/${{ matrix.city }} pipeline/ocr-cache pipeline/pdf-text-cache pipeline/doc-text-cache pipeline/rtf-text-cache pipeline/detail-cache pipeline/uldk-cache; do
            [ -e "$p" ] && git add "$p"
          done
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "data: refresh ${{ matrix.city }} $(date -u +%Y-%m-%d)"
            # Sibling matrix jobs push concurrently; rebase-retry until ours lands.
            # -X theirs: if our own data/<city>/meta.json (its generated_at line)
            # conflicts with a version already on origin (a prior run, a manual
            # push), our fresh crawl wins — we only ever touch our own city + the
            # shared caches (content-addressed, so additions never truly conflict).
            # On any failure, abort the half-done rebase so the next retry starts
            # from a CLEAN tree — otherwise "unmerged files" breaks every retry.
            for i in 1 2 3 4 5 6; do
              git pull --rebase -X theirs origin main && git push && exit 0
              git rebase --abort 2>/dev/null || true
              echo "push attempt $i failed; retrying ..."
              sleep $(( (RANDOM % 8) + 2 ))
            done
            echo "could not push after 6 attempts" >&2
            exit 1
          fi

  # Rebuild data/index.json once, after every city job has finished (also when
  # some failed — their last-published meta.json keeps them in the index).
  index:
    needs: [setup, refresh]
    if: ${{ always() && needs.setup.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: main   # not the triggering SHA — we need the matrix jobs' commits
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'
      - name: Install pipeline deps
        working-directory: pipeline
        run: npm ci || npm install
      - name: Build data/index.json
        working-directory: pipeline
        run: |
          git pull origin main   # pick up any commit that landed since checkout
          npm run build-index
      - name: Commit and push if index changed
        run: |
          git config user.name  "zgm-data-bot"
          git config user.email "zgm-data-bot@users.noreply.github.com"
          git add data/index.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "data: rebuild index $(date -u +%Y-%m-%d)"
            for i in 1 2 3 4 5; do
              git pull --rebase -X theirs origin main && git push && exit 0
              git rebase --abort 2>/dev/null || true
              echo "push attempt $i failed; retrying ..."
              sleep 3
            done
            echo "could not push index after 5 attempts" >&2
            exit 1
          fi
