<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" href="/favicon.ico" sizes="any" />
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
<meta name="color-scheme" content="dark" />
<title>Nie znaleziono strony — przetargimiejskie</title>
<meta name="robots" content="noindex" />
<style>
:root{color-scheme:dark;--bg:#0d1117;--bg-grad:#131a26;--surface:#161b22;--border:#272e3a;
--fg:#e6edf3;--fg-strong:#f4f8fc;--muted:#8b97a8;--faint:#646f80;--accent:#2f81f7;--accent-hi:#5fa0ff;
--font:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
*{box-sizing:border-box}
body{margin:0;font-family:var(--font);background:radial-gradient(1100px 520px at 78% -12%,var(--bg-grad) 0%,transparent 62%),var(--bg);
color:var(--fg);font-size:14px;line-height:1.55;display:flex;min-height:100vh;align-items:center;justify-content:center}
a{color:var(--accent-hi);text-decoration:none}a:hover{color:var(--accent);text-decoration:underline}
.card{max-width:520px;margin:22px;padding:34px 38px;background:var(--surface);border:1px solid var(--border);border-radius:8px}
.code{font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);font-weight:700}
h1{font-size:26px;margin:8px 0 10px;font-weight:800;letter-spacing:-.4px;color:var(--fg-strong)}
p{color:var(--muted);margin:0 0 16px}
.links{display:flex;flex-wrap:wrap;gap:16px;font-size:13.5px}
</style>
</head>
<body>
<div class="card">
  <div class="code">Błąd 404</div>
  <h1>Nie znaleziono strony</h1>
  <p>Adres nie istnieje albo nieruchomość została usunięta z rejestru.
     Wszystkie śledzone przetargi znajdziesz w miastach lub w archiwum.</p>
  <nav class="links">
    <a href="/">Strona główna</a>
    <a href="/miasta/">Miasta</a>
    <a href="/archiwum">Archiwum</a>
    <a href="/raporty">Raporty</a>
  </nav>
</div>
</body>
</html>
