# Deploys przetargimiejskie.pl (GitHub Pages) — DISABLED / FALLBACK ONLY.
#
# przetargimiejskie.pl is now served by Cloudflare Pages/Workers (see
# build-site.sh + wrangler.jsonc). This workflow is kept as a manual fallback in
# case Cloudflare is unavailable, so the push trigger is removed — it now runs
# ONLY when started by hand from the Actions tab (workflow_dispatch). To re-enable
# automatic GitHub Pages deploys, restore the `push:` block below.
#
# NOTE: GitHub Pages and Cloudflare cannot both own the przetargimiejskie.pl
# custom domain at once. If you run this fallback, the domain still points at
# Cloudflare; this only refreshes the *.github.io copy unless you reattach the
# domain under repo Settings → Pages.
#
# The published site = site/ (landing + web archive) + the data/ JSON the
# archive reads + a downloadable copy of the extension. The Chrome extension
# itself keeps living in its own top-level extension/ directory (it is NOT the
# site root); here we just expose it for download.
name: Deploy site (przetargimiejskie.pl) [manual fallback]

on:
  # Auto-deploy disabled — Cloudflare is the live host now. Run by hand only.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r site/. _site/            # landing + /archiwum + /privacy + CNAME
          cp -r data _site/data          # JSON the web archive fetches (/data/...)
          # Expose the extension source for download at /extension.zip
          ( cd extension && zip -qr ../_site/extension.zip . )
          ls -R _site | head -50

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
