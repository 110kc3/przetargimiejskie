<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800"><rect x="0" y="0" width="1280" height="800" rx="0" fill="#0f1623"/><text x="40" y="52" font-family="DejaVu Sans, sans-serif" font-size="25" fill="#e7ecf5" font-weight="700" text-anchor="start">Domy i działki — nie tylko mieszkania</text><text x="40" y="80" font-family="DejaVu Sans, sans-serif" font-size="14" fill="#9fb0c9" font-weight="400" text-anchor="start">Jeden filtr Rodzaj przełącza między mieszkaniami, domami, działkami, lokalami i garażami.</text><rect x="40" y="108" width="240" height="34" rx="8" fill="#121a28" stroke="#7ea6e6" stroke-width="1.5"/><text x="54" y="130" font-family="DejaVu Sans, sans-serif" font-size="13.5" fill="#e7ecf5" font-weight="600" text-anchor="start">Rodzaj: działki</text><text x="264" y="130" font-family="DejaVu Sans, sans-serif" font-size="11" fill="#7ea6e6" font-weight="400" text-anchor="end">▾</text><rect x="40" y="148" width="240" height="178" rx="8" fill="#1a2335" stroke="#2a3650" stroke-width="1"/><text x="58" y="176" font-family="DejaVu Sans, sans-serif" font-size="13" fill="#e7ecf5" font-weight="400" text-anchor="start">Mieszkania</text><text x="58" y="210" font-family="DejaVu Sans, sans-serif" font-size="13" fill="#e7ecf5" font-weight="400" text-anchor="start">Domy</text><rect x="46" y="224" width="228" height="30" rx="6" fill="#24406b"/><text x="58" y="244" font-family="DejaVu Sans, sans-serif" font-size="13" fill="#bcd3f5" font-weight="700" text-anchor="start">Działki</text><text x="262" y="244" font-family="DejaVu Sans, sans-serif" font-size="13" fill="#bcd3f5" font-weight="400" text-anchor="end">✓</text><text x="58" y="278" font-family="DejaVu Sans, sans-serif" font-size="13" fill="#e7ecf5" font-weight="400" text-anchor="start">Lokale użytkowe</text><text x="58" y="312" font-family="DejaVu Sans, sans-serif" font-size="13" fill="#e7ecf5" font-weight="400" text-anchor="start">Garaże</text><rect x="308" y="108" width="301.3333333333333