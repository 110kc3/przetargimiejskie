<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" href="/favicon.ico" sizes="any" />
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
<!-- Natively dark — keeps dark-mode browser extensions from re-tinting. -->
<meta name="color-scheme" content="dark" />
<title>Archiwum przetargów — przetargimiejskie</title>
<meta name="description" content="Przeszukiwalne archiwum miejskich przetargów na mieszkania: Gliwice, Katowice, Bytom, Zabrze, Sosnowiec, Rybnik, Bielsko-Biała, Mysłowice, Świętochłowice, Tarnowskie Góry. Ceny, rundy, zł/m²." />
<style>
/* ===== przetargimiejskie — Slate Ledger (dark) ===== */
:root{
  color-scheme: dark;
  --bg:#0d1117; --bg-grad:#131a26; --surface:#161b22; --surface-2:#1b2230;
  --border:#272e3a; --border-2:#313a48;
  --fg:#e6edf3; --fg-strong:#f4f8fc; --muted:#8b97a8; --faint:#646f80;
  --accent:#2f81f7; --accent-hi:#5fa0ff; --accent-ink:#08111f;
  --accent-weak:rgba(47,129,247,.14);
  --ok:#45b97c; --ok-bg:rgba(69,185,124,.12); --bad:#d8736b; --bad-bg:rgba(216,115,107,.12);
  --c-gliwice:#4f9dff; --c-katowice:#f2645a; --c-zabrze:#e0a73c; --c-bytom:#46c08a;
  --c-sosnowiec:#2bc4c4; --c-rybnik:#a07bf0; --c-myslowice:#38b6e6; --c-bielsko:#ec6cb0; --c-swietochlowice:#b6c34a; --c-tarnowskie-gory:#ef8a4d;
  --radius:8px; --radius-s:6px;
  --font:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
}
*{box-sizing:border-box}
body{margin:0;font-family:var(--font);
  background:radial-gradient(1100px 520px at 78% -12%,var(--bg-grad) 0%,transparent 62%),var(--bg);
  color:var(--fg);font-size:14px;line-height:1.5;font-variant-numeric:tabular-nums;letter-spacing:.1px}
a{color:var(--accent-hi);text-decoration:none}
a:hover{color:var(--accent);text-decoration:underline}
.wrap{max-width:1280px;margin:0 auto;padding:0 22px}
.arc-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px 16px;flex-wrap:wrap;padding:22px 0 18px}
.arc-title{font-size:24px;margin:0 0 3px;font-weight:800;letter-spacing:-.4px;color:var(--fg-strong)}
.arc-sub{color:var(--muted);margin:0;font-size:13px}
.back-link{color:var(--muted);font-size:13.5px;white-space:nowrap}
.err{color:#f0a8a8}
.summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
.summary-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px}
.summary-card h3{margin:0 0 10px;font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:700}
.summary-big{font-size:26px;font-weight:800;margin:0;color:var(--fg-strong);letter-spacing:-.5px}
.summary-big .suffix{font-size:13px;font-weight:500;color:var(--muted);letter-spacing:0}
.summary-row{color:var(--muted);font-size:12.5px;margin-top:5px;display:flex;justify-content:space-between}
.summary-row b{color:var(--fg);font-weight:600}
.filters{display:flex;flex-wrap:wrap;gap:12px;align-items:end;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:16px}
.field{display:flex;flex-direction:column;gap:5px}
.field-label{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--faint);font-weight:600}
.control{background:var(--bg);color:var(--fg);border:1px solid var(--border-2);border-radius:var(--radius-s);
  padding:8px 10px;font-size:13.5px;font-family:var(--font);min-width:130px}
.control:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-weak)}
.result-count{margin-left:auto;align-self:center;color:var(--muted);font-size:13px}
.table-section{margin-top:22px}
.table-title{font-size:12px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);font-weight:700;margin:0 0 10px}
.table-scroll{border:1px solid var(--border);border-radius:var(--radius);overflow-x:auto}
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table thead th{text-align:left;padding:10px 12px;background:var(--surface-2);color:var(--muted);
  font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;
  border-bottom:1px solid var(--border);white-space:nowrap;user-select:none}
.data-table th.sortable{cursor:pointer}
.data-table th.sortable:hover{color:var(--fg)}
.data-table th .arrow{color:var(--accent-hi);margin-left:4px}
.data-table td{padding:9px 12px;border-bottom:1px solid var(--border);white-space:nowrap;color:var(--fg)}
.data-table tbody tr:last-child td{border-bottom:none}
.data-table tbody tr:hover td{background:var(--surface)}
.data-table .num{text-align:right;font-variant-numeric:tabular-nums}
.data-table .addr{white-space:normal;min-width:200px}
.data-table .muted-cell{color:var(--faint)}
/* Działka column is hidden unless the Rodzaj filter is land/houses (toggled in render()). */
body.hide-dz .dz-col{display:none}
body.hide-map .map-col{display:none}
.empty-row td{color:var(--faint);text-align:center;padding:22px}
.chip{display:inline-flex;align-items:center;gap:7px;margin-right:8px;font-size:12.5px;color:var(--fg);font-weight:600}
.chip .city-dot{width:7px;height:7px}
.city-dot{width:8px;height:8px;border-radius:50%;flex:none;display:inline-block}
.pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11.5px;font-weight:600;line-height:1.5}
.pill-sold{color:var(--ok);background:var(--ok-bg)}
.pill-unsold{color:var(--bad);background:var(--bad-bg)}
.pill-archived,.pill-no_winner{color:var(--muted);background:var(--surface-2)}
.pill-reason{color:var(--faint);font-weight:500;font-size:12px;margin-left:2px}
.badge-share{display:inline-block;margin-left:7px;padding:1px 7px;border-radius:999px;font-size:11px;font-weight:600;
  color:var(--accent-hi);background:var(--accent-weak);border:1px solid var(--border-2);vertical-align:1px;white-space:nowrap}
.data-table .src-link{white-space:nowrap;font-size:12.5px}
.dot-gliwice{background:var(--c-gliwice)}.dot-katowice{background:var(--c-katowice)}
.dot-zabrze{background:var(--c-zabrze)}.dot-bytom{background:var(--c-bytom)}
.dot-sosnowiec{background:var(--c-sosnowiec)}.dot-rybnik{background:var(--c-rybnik)}
.dot-myslowice{background:var(--c-myslowice)}.dot-bielsko{background:var(--c-bielsko)}
.dot-swietochlowice{background:var(--c-swietochlowice)}.dot-tarnowskie-gory{background:var(--c-tarnowskie-gory)}
@media (max-width:720px){.summary-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <div class="arc-head">
    <div><h1 class="arc-title">Archiwum przetargów</h1><p class="arc-sub" id="sub">Ładowanie…</p></div>
    <span style="display:inline-flex;gap:16px;align-items:center">
      <a class="back-link" href="/raporty">Raporty</a>
      <a class="back-link" href="/">← strona główna</a>
    </span>
  </div>

  <div class="summary-grid" id="tiles"></div>

  <div class="filters">
    <label class="field" id="f-woj-field" hidden><span class="field-label">Województwo</span>
      <select class="control" id="f-woj"><option value="all">Wszystkie</option></select></label>
    <label class="field"><span class="field-label">Miasto</span>
      <select class="control" id="f-city"><option value="all">Wszystkie</option></select></label>
    <label class="field"><span class="field-label">Rodzaj</span>
      <select class="control" id="f-class">
        <option value="mieszkalny">mieszkania</option>
        <option value="zabudowana">domy</option><option value="grunt">działki</option>
        <option value="uzytkowy">lokale użytkowe</option><option value="garaz">garaże</option></select></label>
    <label class="field"><span class="field-label">Wynik</span>
      <select class="control" id="f-outcome">
        <option value="all">Wszystkie</option><option value="sold">sprzedane</option>
        <option value="unsold">bez sprzedaży</option><option value="no_winner">bez rozstrzygnięcia</option>
        <option value="archived">zakończone</option></select></label>
    <label class="field"><span class="field-label">Rok</span>
      <select class="control" id="f-year"><option value="all">Wszystkie lata</option></select></label>
    <label class="field"><span class="field-label">Szukaj ulicy</span>
      <input class="control" id="f-q" type="search" placeholder="np. Zwycięstwa" /></label>
    <span class="result-count" id="count"></span>
  </div>

  <div class="table-section">
    <h2 class="table-title">Aktualne aukcje</h2>
    <div class="table-scroll">
      <table class="data-table"><thead><tr>
        <th class="sortable num" data-asort="date">Data</th><th>Miasto / nieruchomość</th><th>Typ</th><th class="sortable" data-asort="round">Runda</th>
        <th class="sortable num" data-asort="area">Powierzchnia</th><th class="sortable num" data-asort="start">Cena</th><th class="sortable num" data-asort="m2">zł/m²</th><th class="dz-col">Działka</th><th class="map-col">Mapa</th><th>Źródło</th>
      </tr></thead><tbody id="active-body"></tbody></table>
    </div>
  </div>

  <div class="table-section">
    <h2 class="table-title">Historyczne</h2>
    <div class="table-scroll">
      <table class="data-table"><thead><tr>
        <th class="sortable num" data-sort="date">Data</th><th>Miasto / nieruchomość</th><th>Typ</th>
        <th class="sortable" data-sort="round">Runda</th><th class="sortable num" data-sort="area">Powierzchnia</th>
        <th class="sortable num" data-sort="start">Cena wyw.</th><th class="sortable num" data-sort="final">Cena końc.</th>
        <th class="sortable num" data-sort="m2">zł/m²</th><th>Wynik</th><th class="dz-col">Działka</th><th class="map-col">Mapa</th><th>Źródło</th>
      </tr></thead><tbody id="hist-body"></tbody></table>
    </div>
  </div>
</div>

<script>
// Europe/Warsaw civil date — UTC "today" flips 1-2 h before local midnight,
// keeping an auction "active" too long (mirrors the extension's todayWarsaw()).
const TODAY = new Intl.DateTimeFormat('en-CA',{timeZone:'Europe/Warsaw',year:'numeric',month:'2-digit',day:'2-digit'}).format(new Date());
const nf = new Intl.NumberFormat('pl-PL',{maximumFractionDigits:0});
const nfArea = new Intl.NumberFormat('pl-PL',{maximumFractionDigits:2});
const fmtPLN = n => n==null?'—':nf.format(n)+' zł';
const fmtArea = a => a?nfArea.format(a)+' m²':'—'; // Polish decimal comma, not the raw JSON dot
const fmtM2 = (p,a)=>(p==null||!a)?'—':nf.format(Math.round(p/a))+' zł/m²';
const median = a => { if(!a.length) return null; const s=a.slice().sort((x,y)=>x-y); const m=s.length>>1; return s.length%2?s[m]:(s[m-1]+s[m])/2; };
// Escape crawled strings before they go into innerHTML, and only let http(s)
// URLs through to hrefs (mirrors the extension's esc()/safeHref(), v1.14.3).
const esc = s => String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const safeHref = u => { if(!u) return ''; try{ const x=new URL(u,location.href); return (x.protocol==='http:'||x.protocol==='https:')?x.href:''; }catch{ return ''; } };
// Polish-fold both sides of the street search so "zwyciestwa" matches "Zwycięstwa".
const fold = s => String(s||'').toLowerCase()
  .replace(/[ąàá]/g,'a').replace(/[ćč]/g,'c').replace(/[ęè]/g,'e').replace(/[ł]/g,'l')
  .replace(/[ńñ]/g,'n').replace(/[óòô]/g,'o').replace(/[śš]/g,'s').replace(/[żź]/g,'z');
const KIND = {mieszkalny:'mieszkalny',zabudowana:'dom',zabudowa:'dom',grunt:'działka',uzytkowy:'użytkowy',garaz:'garaż',unknown:'—'};
// Fold legacy house aliases to the canonical kind so the "domy" filter + summary
// tile (which compare === 'zabudowana') don't silently drop an aliased row.
// null/undefined pass through unchanged so the l.kind||p.kind fallbacks still work.
const KIND_ALIAS = {zabudowa:'zabudowana',zabudowy:'zabudowana'};
const aliasKind = k => KIND_ALIAS[k] || k;
const roundLabel = r => r ? `${r}. przet.` : '—';
const OUTCOME = {sold:'sprzedane',unsold:'bez sprzedaży',archived:'zakończone (brak wyniku)',no_winner:'bez rozstrzygnięcia'};
// Why the auction didn't sell, in Polish. 'unknown' carries no info → suppressed
// (the "bez sprzedaży" pill already says it didn't sell). Unmapped codes fall
// through to their raw value so a new reason still surfaces rather than vanishes.
const REASON = {no_deposits:'brak wpłat wadium',bidder_noshow:'oferent się nie stawił',bidder_withdrew:'oferent odstąpił',unknown:''};
const reasonLabel = code => code==null?'':(REASON[code]??code);
// Fractional-share sale ("sprzedaż udziału 4/6 części") — flagged so a price
// that looks low against the others is read as a share, not the whole flat.
const shareBadge = s => s?`<span class="badge-share" title="Sprzedaż udziału ${esc(s)} części nieruchomości">udział ${esc(s)}</span>`:'';
// Direct "verify at the source" link — straight to the city BIP/ZGM page or
// result PDF. Blank when the listing has no source URL.
const srcLink = u => { const h=safeHref(u); return h?`<a class="src-link" href="${esc(h)}" target="_blank" rel="noopener">źródło ↗</a>`:''; };
// Secondary source: the city BIP page for an auction whose primary źródło is
// the ZGM listing (Gliwice lists the same auction on both boards).
const bipLink = u => { const h=safeHref(u); return h?` <a class="src-link" href="${esc(h)}" target="_blank" rel="noopener">BIP ↗</a>`:''; };
// Land: the city portal the plot was crawled from — its SOURCE, shown next to the
// geoportal MAP link so a plot's origin is visible, not only its parcel map.
const portalLink = u => { const h=safeHref(u); return h?` <a class="src-link" href="${esc(h)}" target="_blank" rel="noopener">portal ↗</a>`:''; };
// Land plots link their parcel to a geoportal (resolved per-city in build-land).
const geoLink = r => {
  if (r.parcels && r.parcels.length) {
    const links = r.parcels.map(p=>{const h=safeHref(p.geoportal_url);return h?`<a class="src-link" href="${esc(h)}" target="_blank" rel="noopener">${esc(p.nr)} ↗</a>`:esc(p.nr);}).join(' ');
    return links||'—';
  }
  const h=safeHref(r.geo); return h?`<a class="src-link" href="${esc(h)}" target="_blank" rel="noopener">${esc(r.dz||'mapa')} ↗</a>`:'—';
};
// Direct Google Maps link for non-land listings (flats/houses/commercial/garages).
// Historical rows carry street+building; active rows carry the raw address (apt
// stripped). Land plots use the Działka geoportal link instead.
const mapsLink = r => {
  if (r.kind === 'grunt') return '';
  const base = (r.street ? `${r.street}${r.building?(' '+r.building):''}`
                         : String(r.addr||'').replace(/\s*\/\s*\d+\w*$/,'')).trim();
  if (!base) return '—';
  const q = encodeURIComponent(`${base}, ${r.cityLabel||''}`.replace(/,\s*$/,'').trim());
  return `<a class="src-link" href="https://www.google.com/maps/search/?api=1&query=${q}" target="_blank" rel="noopener">Mapa ↗</a>`;
};

let CITIES=[], records=[], active=[], minDate, maxDate, lastRefresh, WOJ_BY_CITY={};
let sortKey='date', sortDir='desc';
// The "Aktualne aukcje" table has its own sort state so it can be ordered by
// Cena / Powierzchnia / zł/m² independently of the history table below.
let aSortKey='date', aSortDir='asc';

function chip(city,label){ return `<span class="chip"><span class="city-dot dot-${esc(city)}"></span>${esc(label||city)}</span>`; }
function addrText(r){ return `${r.street||''} ${r.building||''}${r.apt?'/'+r.apt:''}`.trim(); }
function arrow(k){ return sortKey===k?`<span class="arrow">${sortDir==='asc'?'▲':'▼'}</span>`:''; }
function aArrow(k){ return aSortKey===k?`<span class="arrow">${aSortDir==='asc'?'▲':'▼'}</span>`:''; }

async function load(){
  let idx;
  try { idx = await fetch('/data/index.json').then(r=>r.json()); }
  catch(e){ document.getElementById('sub').innerHTML='<span class="err">Nie udało się wczytać danych.</span>'; return; }
  CITIES = idx.cities||[];
  lastRefresh = (idx.generated_at||'').slice(0,10);
  const fc=document.getElementById('f-city');
  CITIES.forEach(c=>{const o=document.createElement('option');o.value=c.id;o.textContent=c.label;fc.appendChild(o);});
  // Voivodeship (województwo) filter, driven by index.json's per-city voivodeship.
  WOJ_BY_CITY = Object.fromEntries(CITIES.map(c=>[c.id, c.voivodeship||null]));
  const WOJ_LABELS = {slaskie:'Śląskie', malopolskie:'Małopolskie', opolskie:'Opolskie'};
  const wojs=[...new Set(CITIES.map(c=>c.voivodeship).filter(Boolean))].sort((a,b)=>(WOJ_LABELS[a]||a).localeCompare(WOJ_LABELS[b]||b,'pl'));
  const fw=document.getElementById('f-woj');
  wojs.forEach(w=>{const o=document.createElement('option');o.value=w;o.textContent=WOJ_LABELS[w]||w;fw.appendChild(o);});
  if(wojs.length>1) document.getElementById('f-woj-field').hidden=false;
  // Picking a voivodeship narrows the city dropdown to that voivodeship.
  fw.addEventListener('change',()=>{ const w=fw.value; for(const o of fc.options){ if(o.value==='all') continue; o.hidden = w!=='all' && WOJ_BY_CITY[o.value]!==w; } if(fc.selectedOptions[0]&&fc.selectedOptions[0].hidden) fc.value='all'; });

  await Promise.all(CITIES.map(async c=>{
    try{
      const [props, act, land] = await Promise.all([
        fetch(`/data/${c.id}/properties.json`).then(r=>r.json()).catch(()=>({properties:[]})),
        fetch(`/data/${c.id}/active.json`).then(r=>r.json()).catch(()=>({listings:[]})),
        fetch(`/data/${c.id}/land.json`).then(r=>r.json()).catch(()=>({plots:[]})),
      ]);
      // Canonicalize legacy house-kind aliases in place before any === 'zabudowana'
      // filter/summary comparison downstream (defence-in-depth; the pipeline now
      // heals these too).
      for(const p of (props.properties||[])){
        if(p.kind) p.kind = aliasKind(p.kind);
        for(const l of (p.listings||[])) if(l.kind) l.kind = aliasKind(l.kind);
      }
      for(const l of (act.listings||[])) if(l.kind) l.kind = aliasKind(l.kind);
      for(const p of (props.properties||[]))
        for(const l of (p.listings||[]))
          if(['sold','unsold','archived','no_winner'].includes(l.outcome))
            records.push({city:c.id,cityLabel:c.label,kind:l.kind||p.kind,street:p.street,building:p.building,apt:p.apt,
              date:l.date,round:l.round,area:l.area_m2??p.area_m2??l.land_area_m2,plotArea:(l.area_m2!=null&&l.land_area_m2!=null)?l.land_area_m2:null,start:l.starting_price_pln,final:l.final_price_pln,
              outcome:l.outcome,reason:l.unsold_reason,share:l.share??p.share,src:l.source_pdf||l.detail_url,bip:l.bip_url});
      for(const l of (act.listings||[]))
        if(!l.auction_date || l.auction_date>=TODAY)
          active.push({city:c.id,cityLabel:c.label,kind:l.kind,addr:l.address_raw,round:l.round,
            area:l.area_m2??l.land_area_m2,plotArea:(l.area_m2!=null&&l.land_area_m2!=null)?l.land_area_m2:null,start:l.starting_price_pln,date:l.auction_date,share:l.share,url:l.detail_url,bip:l.bip_url});
      for(const p of (land.plots||[])){
        const disp = p.street ? `${p.street}${p.building?' '+p.building:''}` : (p.dzialka_nr?`dz. ${p.dzialka_nr}${p.obreb?' ('+p.obreb+')':''}`:(p.address_raw||'—'));
        for(const l of (p.listings||[])){
          if(['sold','unsold','archived','no_winner'].includes(l.outcome))
            records.push({city:c.id,cityLabel:c.label,kind:'grunt',street:disp,building:'',apt:'',
              date:l.date,round:l.round,area:p.area_m2??l.area_m2,start:l.starting_price_pln,final:l.final_price_pln,
              outcome:l.outcome,reason:null,share:null,src:l.detail_url||l.source_url,bip:null,portal:l.source_url,geo:p.geoportal_url,dz:p.dzialka_nr,parcels:p.parcels,status:p.status});
          else if(l.outcome==='active' && (!l.date || l.date>=TODAY))
            active.push({city:c.id,cityLabel:c.label,kind:'grunt',addr:disp,round:l.round,
              area:p.area_m2??l.area_m2,start:l.starting_price_pln,date:l.date,share:null,url:l.detail_url||l.source_url,bip:null,portal:l.source_url,geo:p.geoportal_url,dz:p.dzialka_nr,parcels:p.parcels,status:p.status});
        }
      }
    }catch(e){}
  }));

  const dates = records.map(r=>r.date).filter(Boolean).sort();
  minDate=dates[0]; maxDate=dates[dates.length-1];
  const years=[...new Set(records.map(r=>(r.date||'').slice(0,4)).filter(Boolean))].sort().reverse();
  const fy=document.getElementById('f-year');
  years.forEach(y=>{const o=document.createElement('option');o.value=y;o.textContent=y;fy.appendChild(o);});

  document.getElementById('sub').textContent =
    `Dane od ${minDate||'—'} do ${maxDate||'—'} · ${records.length} rekordów · odświeżono ${lastRefresh||'—'}`;

  ['f-woj','f-city','f-class','f-outcome','f-year','f-q'].forEach(id=>document.getElementById(id).addEventListener('input',render));
  document.querySelectorAll('th[data-sort]').forEach(th=>{
    th.dataset.label = th.textContent.trim();
    th.addEventListener('click',()=>{
      const k=th.dataset.sort; if(sortKey===k) sortDir=sortDir==='asc'?'desc':'asc'; else {sortKey=k;sortDir='desc';} render();
    });
  });
  document.querySelectorAll('th[data-asort]').forEach(th=>{
    th.dataset.label = th.textContent.trim();
    th.addEventListener('click',()=>{
      const k=th.dataset.asort; if(aSortKey===k) aSortDir=aSortDir==='asc'?'desc':'asc'; else {aSortKey=k;aSortDir='desc';} render();
    });
  });
  render();
}

function renderSummary(scopeAll){
  const tiles=document.getElementById('tiles');
  const kinds=[['mieszkalny','Mieszkalny'],['zabudowana','Domy'],['grunt','Działki'],['uzytkowy','Użytkowy'],['garaz','Garaż']];
  tiles.innerHTML = kinds.map(([k,label])=>{
    const ofKind = scopeAll.filter(r=>r.kind===k);
    const sold = ofKind.filter(r=>r.outcome==='sold'&&r.final!=null);
    let count,prices,m2,suffix,medLabel;
    if(sold.length){count=sold.length;prices=sold.map(r=>r.final);m2=sold.filter(r=>r.area).map(r=>r.final/r.area);suffix='sprzedanych';medLabel='mediana';}
    else{count=ofKind.length;prices=ofKind.filter(r=>r.start!=null).map(r=>r.start);m2=ofKind.filter(r=>r.area&&r.start!=null).map(r=>r.start/r.area);suffix='w archiwum';medLabel='mediana wyw.';}
    const mt=prices.length?fmtPLN(Math.round(median(prices))):'—';
    const mm=m2.length?nf.format(Math.round(median(m2)))+' zł/m²':'—';
    return `<div class="summary-card"><h3>${label}</h3>
      <p class="summary-big">${count} <span class="suffix">${suffix}</span></p>
      <p class="summary-row"><span>${medLabel}</span><b>${mt}</b></p>
      <p class="summary-row"><span>mediana zł/m²</span><b>${mm}</b></p></div>`;
  }).join('');
}

function getSort(r){ switch(sortKey){case 'date':return r.date||'';case 'round':return r.round??-1;
  case 'area':return r.area??-1;case 'start':return r.start??-1;case 'final':return r.final??-1;
  case 'm2':return (r.area&&(r.final??r.start))?(r.final??r.start)/r.area:-1;default:return '';}}

function refreshHeaders(){
  document.querySelectorAll('th[data-sort]').forEach(th=>{ th.innerHTML = th.dataset.label + arrow(th.dataset.sort); });
  document.querySelectorAll('th[data-asort]').forEach(th=>{ th.innerHTML = th.dataset.label + aArrow(th.dataset.asort); });
}
// Value a row sorts on in the active table; null = "missing" so it can be sunk
// to the bottom regardless of direction (a plot with no price still shows, last).
function activeVal(a){ switch(aSortKey){
  case 'round': return a.round ?? null;
  case 'area':  return a.area ?? null;
  case 'start': return a.start ?? null;
  case 'm2':    return (a.area && a.start!=null) ? a.start/a.area : null;
  default:      return a.date || null; } }
function activeCmp(a,b){ const av=activeVal(a), bv=activeVal(b);
  if(av==null&&bv==null) return 0; if(av==null) return 1; if(bv==null) return -1;
  const c=(typeof av==='number'&&typeof bv==='number')?av-bv:String(av).localeCompare(String(bv));
  return aSortDir==='asc'?c:-c; }

function render(){
  const woj=document.getElementById('f-woj').value,
        city=document.getElementById('f-city').value,
        cls=document.getElementById('f-class').value,
        outcome=document.getElementById('f-outcome').value, year=document.getElementById('f-year').value,
        q=fold(document.getElementById('f-q').value.trim());
  // The Działka column only applies to land + houses; hide it for flats /
  // commercial / garages (the default view is flats, so it starts hidden).
  document.body.classList.toggle('hide-dz', cls!=='grunt'&&cls!=='zabudowana');
  // The Mapa (Google Maps) column is for non-land listings only.
  document.body.classList.toggle('hide-map', cls==='grunt');
  const cityYear = r => (woj==='all'||WOJ_BY_CITY[r.city]===woj) && (city==='all'||r.city===city) && (year==='all'||(r.date||'').slice(0,4)===year);
  renderSummary(records.filter(cityYear));

  const match = r => cityYear(r) && (cls==='all'||r.kind===cls) && (outcome==='all'||r.outcome===outcome)
    && (!q || fold(addrText(r)).includes(q));
  let rows = records.filter(match);
  rows.sort((a,b)=>{const av=getSort(a),bv=getSort(b);const c=(typeof av==='number'&&typeof bv==='number')?av-bv:String(av).localeCompare(String(bv));return sortDir==='asc'?c:-c;});
  document.getElementById('count').textContent = rows.length+' rekordów';
  document.getElementById('hist-body').innerHTML = rows.map(r=>`<tr>
    <td class="num muted-cell">${esc(r.date)||esc(r.status)||'<span title="Brak daty w dokumencie źródłowym">—</span>'}</td>
    <td class="addr">${chip(r.city,r.cityLabel)}${esc(addrText(r))}${shareBadge(r.share)}</td>
    <td>${esc(KIND[r.kind]||r.kind)}</td>
    <td>${roundLabel(r.round)}</td>
    <td class="num">${fmtArea(r.area)}</td>
    <td class="num">${fmtPLN(r.start)}</td>
    <td class="num">${r.final!=null?fmtPLN(r.final):'<span title="Cena końcowa nieopublikowana w źródle (lub brak sprzedaży)">—</span>'}</td>
    <td class="num">${fmtM2(r.outcome==='sold'?r.final:r.start, r.area)}</td>
    <td><span class="pill pill-${esc(r.outcome)}">${esc((OUTCOME[r.outcome]||r.outcome).replace(/ \(.*\)/,''))}</span>${r.outcome==='unsold'&&reasonLabel(r.reason)?`<span class="pill-reason">${esc(reasonLabel(r.reason))}</span>`:''}</td>
    <td class="dz-col">${r.plotArea?esc(fmtArea(r.plotArea)):geoLink(r)}</td>
    <td class="map-col">${mapsLink(r)}</td>
    <td>${srcLink(r.src)}${bipLink(r.bip)}${r.kind==='grunt'&&r.portal&&r.portal!==r.src?portalLink(r.portal):''}</td>
  </tr>`).join('') || '<tr class="empty-row"><td colspan="12">Brak rekordów dla wybranych filtrów.</td></tr>';

  const acts = active.filter(a=>(woj==='all'||WOJ_BY_CITY[a.city]===woj)&&(city==='all'||a.city===city)&&(cls==='all'||a.kind===cls)&&(!q||fold(a.addr).includes(q)));
  // Header-driven sort (Data default = soonest first). Undated / unpriced rows
  // always sink to the bottom so the "—" cells never displace rows with a value.
  acts.sort(activeCmp);
  document.getElementById('active-body').innerHTML = acts.map(a=>{
    const href = safeHref(a.url);
    return `<tr>
    <td class="num muted-cell">${esc(a.date)||esc(a.status)||'<span title="Wykaz / pre-ogłoszenie — urząd nie ustalił jeszcze terminu przetargu">termin nieogłoszony</span>'}</td>
    <td class="addr">${chip(a.city,a.cityLabel)}${esc(a.addr)||''}${shareBadge(a.share)}</td>
    <td>${esc(KIND[a.kind]||a.kind)}</td>
    <td>${roundLabel(a.round)}</td>
    <td class="num">${fmtArea(a.area)}</td>
    <td class="num">${fmtPLN(a.start)}</td>
    <td class="num">${fmtM2(a.start,a.area)}</td>
    <td class="dz-col">${a.plotArea?esc(fmtArea(a.plotArea)):geoLink(a)}</td>
    <td class="map-col">${mapsLink(a)}</td>
    <td>${srcLink(href)}${bipLink(a.bip)}${a.kind==='grunt'&&a.portal&&a.portal!==a.url?portalLink(a.portal):''}</td>
  </tr>`;}).join('') || '<tr class="empty-row"><td colspan="10">Brak aktualnych aukcji dla wybranych filtrów.</td></tr>';

  refreshHeaders();
}

load();
</script>
</body>
</html>
