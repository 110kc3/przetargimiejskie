# Deploys przetargimiejskie.pl (GitHub Pages) — DISABLED / FALLBACK ONLY.
#
# THE LIVE HOST IS OVH (see .github/workflows/ovh-deploy.yml). przetargimiejskie.pl's
# DNS A/AAAA records point at OVH shared hosting, and ovh-deploy.yml is the only
# path that deploys automatically. This GitHub Pages workflow is kept purely as a
# manual fallback for when OVH is unavailable, so the push trigger is removed — it
# runs ONLY when started by hand from the Actions tab (workflow_dispatch). To make
# GitHub Pages the live host instead, restore the `push:` block below AND repoint
# the domain's DNS to GitHub Pages (and reattach it under repo Settings → Pages).
#
# NOTE: only one host can own the przetargimiejskie.pl custom domain at a time.
# Running this fallback only refreshes the *.github.io copy unless you also
# repoint DNS away from OVH — the live domain keeps pointing at OVH.
#
# The published site = site/ (landing + web archive) + the data/ JSON the
# archive reads + a downloadable copy of the extension. The Chrome extension
# itself keeps living in its own top-level extension/ directory (it is NOT the
# site root); here we just expose it for download.
name: Deploy site (przetargimiejskie.pl) [manual fallback]

on:
  # Auto-deploy disabled — OVH is the live host (ovh-deploy.yml). Run by hand only.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r site/. _site/            # landing + /archiwum + /privacy + CNAME
          cp -r data _site/data          # JSON the web archive fetches (/data/...)
          # Expose the extension source for download at /extension.zip
          ( cd extension && zip -qr ../_site/extension.zip . )
          ls -R _site | head -50

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
